<!DOCTYPE html>
<html lang="es" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Estudiantes - Personalizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        /* Ajustes de integración para FullCalendar y Modo Oscuro */
        .dark .fc {
            --fc-border-color: #334155;
            --fc-page-bg-color: #0f172a;
            --fc-neutral-bg-color: #1e293b;
            color: #f1f5f9;
        }
        .dark .fc-theme-standard td, .dark .fc-theme-standard th { border-color: #1e293b; }
        .dark .fc-col-header-cell-cushion, .dark .fc-daygrid-day-number, .dark .fc-list-day-text, .dark .fc-list-day-side-text { color: #94a3b8; }
        .dark .fc-list-event:hover td { background-color: #1e293b; }
        .dark .fc-button-primary { background-color: #3b82f6; border-color: #3b82f6; }
        .dark .fc-button-primary:disabled { background-color: #1e293b; border-color: #1e293b; }
        .fc-event { transition: transform 0.2s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans h-screen flex overflow-hidden transition-colors duration-300">

    <aside id="sidebar" class="bg-slate-900 text-white w-64 flex flex-col transition-all duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-40 h-full shadow-xl hidden overflow-hidden md:w-20 hover:md:w-64 sidebar-state">
        <div class="p-5 flex items-center justify-between border-b border-slate-700 min-h-[73px]">
            <span class="text-xl font-bold tracking-wider text-blue-400 sidebar-text whitespace-nowrap overflow-hidden transition-all duration-300">I.S.F.D. N° 57</span>
            <button id="close-sidebar" class="md:hidden text-white min-w-[24px]"><i class="fas fa-times"></i></button>
            <button id="pin-sidebar" onclick="togglePinSidebar()" class="hidden md:block text-slate-400 hover:text-white transition-colors min-w-[24px]"><i class="fas fa-thumbtack transform transition-transform" id="pin-icon"></i></button>
        </div>
        
        <div class="p-6 flex flex-col items-center border-b border-slate-700 cursor-pointer hover:bg-slate-800 transition relative" onclick="navigate('perfil')">
            <div id="sidebar-avatar-container" class="w-16 h-16 transition-all duration-300 rounded-full border-2 border-blue-500 p-1 bg-slate-700 flex items-center justify-center text-xl mb-2 overflow-hidden shrink-0 avatar-wrapper">
                <img id="sidebar-avatar-img" src="" class="w-full h-full object-cover rounded-full hidden" alt="Avatar">
                <i id="sidebar-avatar-icon" class="fas fa-user-graduate"></i>
            </div>
            <div class="sidebar-text flex flex-col items-center overflow-hidden transition-all duration-300 whitespace-nowrap">
                <span id="sidebar-username" class="font-bold text-lg text-center truncate w-full">Usuario</span>
                <span class="text-xs text-blue-400">Panel de Control</span>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <a href="javascript:void(0)" onclick="navigate('home')" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-all nav-link"><div class="w-8 flex justify-center shrink-0"><i class="fas fa-home text-xl"></i></div> <span class="sidebar-text whitespace-nowrap overflow-hidden transition-all duration-300 ml-4">Inicio</span></a>
            <a href="javascript:void(0)" onclick="navigate('calendario')" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-all nav-link"><div class="w-8 flex justify-center shrink-0"><i class="fas fa-calendar-alt text-xl"></i></div> <span class="sidebar-text whitespace-nowrap overflow-hidden transition-all duration-300 ml-4">Mi Calendario</span></a>
            <a href="javascript:void(0)" onclick="navigate('horarios')" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-all nav-link"><div class="w-8 flex justify-center shrink-0"><i class="fas fa-clock text-xl"></i></div> <span class="sidebar-text whitespace-nowrap overflow-hidden transition-all duration-300 ml-4">Mis Horarios</span></a>
            <a href="javascript:void(0)" onclick="navigate('foro')" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-all nav-link"><div class="w-8 flex justify-center shrink-0"><i class="fas fa-comments text-xl"></i></div> <span class="sidebar-text whitespace-nowrap overflow-hidden transition-all duration-300 ml-4">Foro Académico</span></a>
            <a href="javascript:void(0)" onclick="navigate('materias')" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-all nav-link"><div class="w-8 flex justify-center shrink-0"><i class="fas fa-book text-xl"></i></div> <span class="sidebar-text whitespace-nowrap overflow-hidden transition-all duration-300 ml-4">Materias</span></a>
            <a href="javascript:void(0)" onclick="navigate('instructivos')" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-all nav-link"><div class="w-8 flex justify-center shrink-0"><i class="fas fa-file-alt text-xl"></i></div> <span class="sidebar-text whitespace-nowrap overflow-hidden transition-all duration-300 ml-4">Instructivos</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full relative overflow-hidden">
        <header id="main-header" class="bg-white dark:bg-slate-900 shadow-sm p-4 flex items-center justify-between z-10 hidden border-b dark:border-slate-800">
            <div class="flex items-center">
                <button id="open-sidebar" class="text-slate-600 dark:text-slate-300 hover:text-blue-600 mr-4 md:hidden"><i class="fas fa-bars text-xl"></i></button>
                <h1 id="page-title" class="text-xl font-black text-slate-800 dark:text-white uppercase tracking-tighter">Inicio</h1>
            </div>
        <div class="flex items-center gap-4">
            <!-- Campana de notificaciones para Alumnos -->
            <div id="notification-bell-container" class="relative hidden">
                <button onclick="toggleNotifications()" class="text-slate-600 dark:text-slate-300 hover:text-blue-600 transition relative outline-none">
                    <i class="fas fa-bell text-xl"></i>
                    <span id="notification-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden shadow-sm">0</span>
                </button>
                <div id="notification-dropdown" class="hidden absolute right-0 top-10 w-80 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border dark:border-slate-700 overflow-hidden z-50">
                    <div class="p-4 border-b dark:border-slate-700 font-bold text-sm bg-slate-50 dark:bg-slate-900 flex justify-between items-center">
                        <span class="text-slate-700 dark:text-white"><i class="fas fa-bell mr-2 text-blue-500"></i> Notificaciones</span>
                        <button onclick="clearNotifications()" class="text-xs text-blue-500 hover:text-blue-600 font-bold">Marcar leídas</button>
                    </div>
                    <div id="notification-list" class="max-h-72 overflow-y-auto p-2 space-y-2 bg-slate-100/50 dark:bg-slate-900/50"></div>
                </div>
            </div>
            <div id="header-user" class="text-sm font-medium text-slate-500 dark:text-slate-400 hidden md:block"></div>
        </div>
        </header>

        <main id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8 transition-colors duration-300">
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/components/auth.js"></script>
    <script src="js/components/home.js"></script>
    <script src="js/components/horarios.js"></script>
    <script src="js/components/calendario.js"></script>
    <script src="js/components/foro.js"></script>
    <script src="js/components/materias.js"></script>
    <script src="js/components/instructivos.js"></script>
    <script src="js/components/perfil.js"></script>
</body>
</html>
